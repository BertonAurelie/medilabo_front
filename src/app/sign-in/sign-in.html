<div class="sign-in_container">
    <form (ngSubmit)="loginPatient()" #loginForm="ngForm">

        <div class="input_container">
            <label for="email">Email :</label>
            <hr id="email_hr" aria-hidden="true">
            <input 
                type="email" 
                id="email" 
                name="email" 
                [(ngModel)]="email" 
                required />

            <label for="password">Mot de passe :</label>
            <hr id="password_hr" aria-hidden="true">
            <input 
                type="password" 
                id="password" 
                name="password" 
                [(ngModel)]="password" 
                required />
        </div>

        <div class="button_container">
            <button id="sign_in" type="submit" [disabled]="loginForm.invalid">
                Se connecter
            </button>
        </div>
    </form>
</div>
