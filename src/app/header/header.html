<header>
    <div class="search-bar">
        <div class = "search-bar__wrapper">
            <input id = "open" placeholder="recherche patient"/>
             <div id="icon_container">
                <i id="search-bar_icon" class="fa-solid fa-magnifying-glass"></i>
            </div>
        </div>
    </div>
    <nav id="sign">
        <ng-container *ngIf="(auth.isLoggedIn$ | async); else loggedOut">
            <a href="#" (click)="logout($event)">Se déconnecter</a>
        </ng-container>

        <ng-template #loggedOut>
            <a routerLink="/signUp">S'inscrire</a>
            <a routerLink="/login">Se connecter</a>
        </ng-template>
    </nav>
</header>
