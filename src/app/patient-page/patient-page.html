<div class = "patient-page_container">
    @if(patient$ | async; as patient){
    <div class="banniere">
        <h1>Patient {{patient.lastName}} {{patient.firstName}}</h1>
        <button routerLink="/patientsList" ><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="grid">
        <div class = "container1">
            <div class = "box1">
                <div class = "box-info">
                    <label for ="gender">Genre : </label>
                    <input id="gender" [value]="patient.gender" readonly aria-readonly="true" />
                </div>
                <div class = "box-info">
                    <label for ="birthday">Date de naissance : </label>
                    <input id="birthday" [value]="(patient.birthday | date:'dd/MM/yyyy')" readonly aria-readonly="true" />
                </div>
                <div class = "box-info">
                    <label for ="adress"> Âge : </label>
                    <input id="age" [value]="patient.age" readonly aria-readonly="true" />
                </div>
                
                <div class = "box-info">
                    <label for ="phoneNumber">Téléphone : </label>
                    <input id="phoneNumber" [value]="patient.phoneNumber" readonly aria-readonly="true" />
                </div>
                <div class = "box-info">
                    <label for ="adress"> Adresse : </label>
                    <input id="address" [value]="patient.address" readonly aria-readonly="true" />
                </div>
                <div class="box-info">
                    <label for="diabetes">Risque de diabète :</label>

                    <input id="diabetes"
                        [value]="diabetesRisk"
                        readonly
                        [ngClass]="diabetesRisk" 
                    />
                </div>
            </div>
            <div class="box2">
                @for (reportt of (reportt$ | async ) ?? [] ; track $index ) {
                    <div class = "report">
                        <p class ="report_date">{{ reportt.dateNote | date:'dd/MM/yyyy' }}</p>
                        <p class="report_note">{{reportt.note}}</p>
                    </div>
                    <hr>
                }
            </div>
        </div>
        <form (ngSubmit)="addReport()">
            <fieldset class="box3">
                <legend>compte rendu :</legend>
                <textarea
                [(ngModel)]="report.note"
                name="note"
                required
                ></textarea>

                <button type="submit">Enter</button>
            </fieldset>
        </form>  
    </div>
    }
</div>
