<div class = "patient-page_container">
    @if(patient$ | async; as patient){
    <div class="banniere">
        <h1>Patient {{patient.lastName}} {{patient.firstName}}</h1>
        <button routerLink="/patientsList" ><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="grid">
        <div class = "container1">
            <div class = "box1">
                <div class = "box-info">
                    <label for ="gender">Genre : </label>
                    <p>{{patient.gender}}</p>
                </div>
                <div class = "box-info">
                    <label for ="birthday">Date de naissance : </label>
                    <p>{{patient.birthday | date: 'shortDate'}}</p>
                </div>
                <div class = "box-info">
                    <label for ="adress"> Âge : </label>
                    <p>{{patient.age}}</p>
                </div>
                
                <div class = "box-info">
                    <label for ="phoneNumber">Téléphone : </label>
                    <p>{{patient.phoneNumber}}</p>
                </div>
                <div class = "box-info">
                    <label for ="adress"> Adresse : </label>
                    <p>{{patient.address}}</p>
                </div>
            </div>
            <div class="box2">
                <h2>Hello</h2>
            </div>
        </div>
        <form>
            <fieldset class="box3">
                <legend>compte rendu : </legend>
                <textarea></textarea>
                <button>Enter</button>
            </fieldset>
        </form>
        
    </div>
    }
</div>
