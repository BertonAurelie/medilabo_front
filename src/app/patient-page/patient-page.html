<div class = "patient-page_container">
    <div class="banniere">
        <h1>Patient {{patient?.lastName}}</h1>
        <button routerLink="/patientsList" ><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="grid">
        <div class = "container1">
            <div class = "box1">
                <div>
                    <label for ="birthday">Date de naissance : </label>
                    <p>{{patient?.birthday}}</p>
                </div>
                <div>
                    <label for ="gender">Genre : </label>
                    <p>{{patient?.gender}}</p>
                </div>
                <div>
                    <label for ="adress"> Adresse : </label>
                    <p>{{patient?.adress}}</p>
                </div>
                <div>
                    <label for ="phoneNumber">Téléphone : </label>
                    <p>{{patient?.phoneNumber}}</p>
                </div>
            </div>
            <div class="box2">
                <h2>Hello</h2>
            </div>
        </div>
        <form>
            <fieldset class="box3">
                <legend>compte rendu : </legend>
                <textarea></textarea>
                <button>Enter</button>
            </fieldset>
        </form>
        
    </div>
</div>
